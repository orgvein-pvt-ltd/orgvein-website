{% load static %}
<link rel="stylesheet" href="{% static 'css/navbar.css' %}">

<nav class="navbar navbar-expand-lg custom-navbar2">
  <div class="container-fluid px-lg-5">
    <a class="navbar-brand brand2" href="{% url 'home' %}">
        <img src="{% static 'img/ov_logo.png' %}" alt="Orgvein Logo" class="navbar-logo">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
            <a class="nav-link nav2-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
               href="{% url 'home' %}">
               Home
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link nav2-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
               href="{% url 'about' %}">
               About
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link nav2-link {% if request.resolver_match.url_name == 'services' %}active{% endif %}"
               href="{% url 'services' %}">
               Services
            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link nav2-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
               href="{% url 'contact' %}">
               Contact
            </a>
        </li>
        <div class="nav2-divider d-none d-lg-block"></div>
        <li class="nav-item">
          <a class="nav-link nav2-cta" href="#diagnosis">Diagnose &rarr;</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
