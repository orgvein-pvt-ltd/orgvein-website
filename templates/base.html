<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}OrgVein{% endblock %}</title>
    <meta name="description"
          content="{% block meta_description %}OrgVein helps businesses improve operations, processes, and technology through business architecture consulting.{% endblock %}">
    <meta property="og:title" content="{% block og_title %}OrgVein{% endblock %}">
    <meta property="og:description"
          content="{% block og_description %}Business Architecture & Digital Transformation Consulting{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="https://orgvein.com/static/img/og-image.webp">
    <meta property="og:site_name" content="OrgVein">
    <meta name="robots" content="index, follow">
    {% block extra_head %}{% endblock %}
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/new_logo.png' %}">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/about.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/services.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/services_data.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/contact.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/mobile_view.css' %}"/>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "OrgVein",
      "image": "https://orgvein.com/static/img/new_logo.webp",
      "@id": "https://orgvein.com/#localbusiness",
      "url": "https://orgvein.com",
      "telephone": "+919249539294",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "35/2659A, Near Lulu Mall",
        "addressLocality": "Kozhikode",
        "addressRegion": "Kerala",
        "postalCode": "673007",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 11.2588,
        "longitude": 75.7804
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.linkedin.com/company/orgvein"
      ]
    }
    </script>
</head>
<body>

{% include "components/navbar.html" %}

{% block full_width %}{% endblock %}

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

{% include "components/footer.html" %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
