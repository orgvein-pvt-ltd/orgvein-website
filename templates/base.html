<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}OrgVein{% endblock %}</title>
    <meta name="description"
          content="{% block meta_description %}Business consultancy services in Kozhikode by Orgvein help businesses strengthen HR, sales, operations, marketing, ERP and growth systems{% endblock %}">
    <meta property="og:title" content="{% block og_title %}OrgVein{% endblock %}">
    <meta property="og:description"
          content="{% block og_description %}Business Consulting and Management Services| Orgvein{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="https://orgvein.com/static/img/og-image.webp">
    <meta property="og:site_name" content="OrgVein">
    <meta name="robots" content="index, follow">
    {% block extra_head %}{% endblock %}
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/new_logo.png' %}">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/about.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/services.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/services_data.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/contact.css' %}"/>
    <link rel="stylesheet" href="{% static 'css/mobile_view.css' %}"/>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "OrgVein",
      "image": "https://orgvein.com/static/img/new_logo.webp",
      "@id": "https://orgvein.com/#localbusiness",
      "url": "https://orgvein.com",
      "telephone": "+919249539294",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "35/2659A, Near Lulu Mall",
        "addressLocality": "Kozhikode",
        "addressRegion": "Kerala",
        "postalCode": "673007",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 11.2588,
        "longitude": 75.7804
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.linkedin.com/company/orgvein"
      ]
    }
    </script>
</head>
<body>

{% include "components/navbar.html" %}

{% block full_width %}{% endblock %}

<main class="container py-4">
    {% block content %}{% endblock %}
</main>

{% include "components/footer.html" %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
<a href="https://wa.me/919249539294?text=Hi%20OrgVein,%20I%20would%20like%20to%20know%20more%20about%20your%20services." 
       class="whatsapp-floating-btn" 
       target="_blank" 
       rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="27" height="27" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
  <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
</svg>
    </a>

    <style>
        .whatsapp-floating-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white !important;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            transition: transform 0.2s ease-in-out;
            text-decoration: none;
        }
        .whatsapp-floating-btn:hover {
            transform: scale(1.1);
        }
        /* Mobile configuration to ensure it never stretches */
        @media (max-width: 768px) {
            .whatsapp-floating-btn {
                width: 50px !important;
                height: 50px !important;
                bottom: 15px;
                right: 15px;
            }
            .whatsapp-floating-btn svg {
                width: 24px !important;
                height: 24px !important;
            }
        }
    </style></body>
</html>
